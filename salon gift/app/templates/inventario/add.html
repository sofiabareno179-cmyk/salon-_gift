{% extends "base.html" %}

{% block title %}Nuevo Registro de Inventario{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white py-3">
                    <h5 class="mb-0 text-center"><i class="fas fa-plus-circle me-2"></i>Nuevo Movimiento</h5>
                </div>
                <div class="card-body p-4">
                    <form action="{{ url_for('inventario.nuevo_item') }}" method="POST">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Cantidad en Stock</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-layer-group"></i></span>
                                <input type="number" name="stock" class="form-control" placeholder="Ej: 50" min="0" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Fecha de Ingreso/Actualización</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-calendar-day"></i></span>
                                <input type="date" name="fecha" class="form-control" required>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">Guardar Registro</button>
                            <a href="{{ url_for('inventario.listar_inventario') }}" class="btn btn-outline-secondary">
                                Volver al Listado
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
