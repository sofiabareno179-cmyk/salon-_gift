<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Salon Glitt{% endblock %}</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

    <header class="main-header">
        <nav class="nav-container">
            <div class="nav-logo">
                <a href="{{ url_for('user.index') }}">
                    <i class="fas fa-scissors"></i> Salon<span>Glitt</span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="{{ url_for('user.index') }}">Inicio</a></li>
                <li><a href="{{ url_for('perfil.index') }}">Perfil</a></li>
                
                {% if current_user.is_authenticated %}
                    <li><a href="{{ url_for('auth.logout') }}">Cerrar Sesión</a></li>
                {% else %}
                    <li><a href="{{ url_for('auth.login') }}" class="btn-login">Iniciar Sesión</a></li>
                {% endif %}
            </ul>
        </nav>
    </header>

    <main class="content-wrapper">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
