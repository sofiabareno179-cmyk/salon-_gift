{% extends "base.html" %}

{% block title %}Nueva Agenda{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{{ url_for('listar_agendas') }}">Agenda</a></li>
                    <li class="breadcrumb-item active">Nuevo Registro</li>
                </ol>
            </nav>

            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Registrar Horario</h5>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('crear_agenda') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Día</label>
                            <select name="diasemana" class="form-select" required>
                                <option value="" selected disabled>Seleccionar día...</option>
                                <option>Lunes</option>
                                <option>Martes</option>
                                <option>Miércoles</option>
                                <option>Jueves</option>
                                <option>Viernes</option>
                                <option>Sábado</option>
                                <option>Domingo</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col">
                                <label class="form-label fw-bold">Desde</label>
                                <input type="time" name="horainicio" class="form-control" required>
                            </div>
                            <div class="col">
                                <label class="form-label fw-bold">Hasta</label>
                                <input type="time" name="horafin" class="form-control" required>
                            </div>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{{ url_for('listar_agendas') }}" class="btn btn-light border">Cancelar</a>
                            <button type="submit" class="btn btn-primary px-4">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
